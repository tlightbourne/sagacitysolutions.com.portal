name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-dotnet:
    name: Build & Test .NET Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore sagacitysolutions.com.portal.slnx

      - name: Build Solution
        run: dotnet build sagacitysolutions.com.portal.slnx --no-restore -c Release

      - name: Pre-pull Docker Images for Testcontainers
        run: docker pull postgres:14-alpine

      - name: Run Unit & Integration Tests
        run: dotnet test sagacitysolutions.com.portal.slnx --no-build -c Release --verbosity normal

  build-and-test-client:
    name: Build & Test React Client & BFF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Client Dependencies
        working-directory: ./src/sagacitysolutions.com.portal.Client
        run: npm ci

      - name: Lint Client
        working-directory: ./src/sagacitysolutions.com.portal.Client
        run: npm run lint

      - name: Run Client Unit Tests
        working-directory: ./src/sagacitysolutions.com.portal.Client
        run: npm run test:unit

      - name: Build Client SPA
        working-directory: ./src/sagacitysolutions.com.portal.Client
        run: npm run build

      - name: Install BFF Dependencies
        working-directory: ./src/sagacitysolutions.com.portal.Bff
        run: npm ci

  docker-compose-validation:
    name: Validate Docker Compose Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Compose Config
        run: docker compose config
