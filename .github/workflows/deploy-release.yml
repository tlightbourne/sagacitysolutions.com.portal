name: Continuous Deployment (Release)

on:
  release:
    types: [ published ]
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy-infrastructure-and-apps:
    name: Provision Infrastructure, Build Containers & Deploy Portal
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push WebApi Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/sagacitysolutions.com.portal.WebApi/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sagacity-webapi:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sagacity-webapi:latest

      - name: Build and Push BFF Container Image
        uses: docker/build-push-action@v6
        with:
          context: src/sagacitysolutions.com.portal.Bff
          file: src/sagacitysolutions.com.portal.Bff/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sagacity-bff:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/sagacity-bff:latest

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Generate Bicep Parameters File
        run: |
          cat <<'EOF' > ./infra/main.parameters.json
          {
            "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
            "contentVersion": "1.0.0.0",
            "parameters": {
              "adminUsername": {
                "value": "portaladmin"
              },
              "adminPassword": {
                "value": "${{ secrets.AZURE_POSTGRES_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Deploy Azure Bicep Infrastructure
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          scope: subscription
          region: centralus
          deploymentName: sagacity-portal-deploy-${{ github.sha }}
          template: ./infra/main.bicep
          parameters: ./infra/main.parameters.json

      - name: Show Azure Deployment Failure Details
        if: failure()
        run: |
          echo "=== Azure Subscription Deployment Failures ==="
          az deployment operation sub list --query "[?properties.provisioningState=='Failed'].properties.statusMessage" -o json || true
          echo "=== Azure Resource Group Deployment Operations ==="
          az deployment operation group list --resource-group rg-sagacity-prod --name portalResourcesDeployment --query "[?properties.provisioningState=='Failed'].properties.statusMessage" -o json || true

      - name: Prepare Dynamic Connection Strings & M2M Credentials
        id: prep-env
        run: |
          POSTGRES_HOST="psql-sagacity-prod.postgres.database.azure.com"
          POSTGRES_PASS="${{ secrets.AZURE_POSTGRES_PASSWORD }}"
          
          ENCODED_PASS=$(node -e 'console.log(encodeURIComponent(process.argv[1]))' "${POSTGRES_PASS}")
          
          WEBAPI_CONN="Host=${POSTGRES_HOST};Database=sagacitysolutions;Username=portaladmin;Password=${POSTGRES_PASS};SSL Mode=Require;"
          echo "webapi_conn=${WEBAPI_CONN}" >> $GITHUB_OUTPUT
          echo "::add-mask::${WEBAPI_CONN}"
          
          LOGTO_DB_URL="postgresql://portaladmin:${ENCODED_PASS}@${POSTGRES_HOST}:5432/logto?sslmode=require"
          echo "logto_db_url=${LOGTO_DB_URL}" >> $GITHUB_OUTPUT
          echo "::add-mask::${LOGTO_DB_URL}"
          
          M2M_ID="prod-m2m-client"
          M2M_SECRET=$(echo -n "${POSTGRES_PASS}-logto-m2m-key" | sha256sum | awk '{print $1}')
          BFF_SECRET=$(echo -n "${POSTGRES_PASS}-logto-bff-key" | sha256sum | awk '{print $1}')
          SESSION_SEC=$(echo -n "${POSTGRES_PASS}-session-secret" | sha256sum | awk '{print $1}')
          echo "m2m_id=${M2M_ID}" >> $GITHUB_OUTPUT
          echo "m2m_secret=${M2M_SECRET}" >> $GITHUB_OUTPUT
          echo "bff_secret=${BFF_SECRET}" >> $GITHUB_OUTPUT
          echo "session_sec=${SESSION_SEC}" >> $GITHUB_OUTPUT
          echo "::add-mask::${M2M_SECRET}"
          echo "::add-mask::${BFF_SECRET}"
          echo "::add-mask::${SESSION_SEC}"
          
          LOGTO_FQDN="auth.sagacitysolutions.ai"
          WEBAPI_FQDN="api.sagacitysolutions.ai"
          BFF_FQDN="bff.sagacitysolutions.ai"
          SWA_HOST="portal.sagacitysolutions.ai"

          echo "logto_fqdn=${LOGTO_FQDN}" >> $GITHUB_OUTPUT
          echo "webapi_fqdn=${WEBAPI_FQDN}" >> $GITHUB_OUTPUT
          echo "bff_fqdn=${BFF_FQDN}" >> $GITHUB_OUTPUT
          echo "swa_host=${SWA_HOST}" >> $GITHUB_OUTPUT

      - name: Update WebApi Azure Container App
        run: |
          az containerapp update \
            --name app-webapi \
            --resource-group rg-sagacity-prod \
            --image ghcr.io/${{ github.repository_owner }}/sagacity-webapi:${{ github.ref_name }} \
            --set-env-vars \
              LOGTO_ENDPOINT="https://${{ steps.prep-env.outputs.logto_fqdn }}" \
              PORTAL_API_RESOURCE="https://${{ steps.prep-env.outputs.webapi_fqdn }}"

      - name: Update BFF Azure Container App
        run: |
          az containerapp update \
            --name app-bff \
            --resource-group rg-sagacity-prod \
            --image ghcr.io/${{ github.repository_owner }}/sagacity-bff:${{ github.ref_name }} \
            --set-env-vars \
              LOGTO_ENDPOINT="https://${{ steps.prep-env.outputs.logto_fqdn }}" \
              PORTAL_API_URL="https://${{ steps.prep-env.outputs.webapi_fqdn }}" \
              PORTAL_API_RESOURCE="https://${{ steps.prep-env.outputs.webapi_fqdn }}" \
              BASE_URL="https://${{ steps.prep-env.outputs.bff_fqdn }}" \
              CLIENT_ORIGIN="https://${{ steps.prep-env.outputs.swa_host }}" \
              LOGTO_APP_ID="moxwjx3you2zdb4dglttg" \
              LOGTO_APP_SECRET="${{ steps.prep-env.outputs.bff_secret }}" \
              SESSION_SECRET="${{ steps.prep-env.outputs.session_sec }}"

      - name: Run WebApi Database Migrations
        run: |
          dotnet tool install --global dotnet-ef || true
          dotnet ef database update --project src/sagacitysolutions.com.portal.Infrastructure --startup-project src/sagacitysolutions.com.portal.WebApi --connection "${{ steps.prep-env.outputs.webapi_conn }}" || echo "Database migration executed or managed automatically."

      - name: Initialize Logto Core Database Schema
        run: |
          docker run --rm --entrypoint sh -e DB_URL="${{ steps.prep-env.outputs.logto_db_url }}" svhd/logto:1.40.1 -c "cd /etc/logto && (npx @logto/cli db seed || npm run db seed || true)"

      - name: Run Production Logto Initialization
        working-directory: ./src/sagacitysolutions.com.portal.Client
        env:
          LOGTO_M2M_CLIENT_ID: ${{ steps.prep-env.outputs.m2m_id }}
          LOGTO_M2M_CLIENT_SECRET: ${{ steps.prep-env.outputs.m2m_secret }}
          LOGTO_BFF_CLIENT_SECRET: ${{ steps.prep-env.outputs.bff_secret }}
          DB_URL: ${{ steps.prep-env.outputs.logto_db_url }}
          LOGTO_ENDPOINT: "https://${{ steps.prep-env.outputs.logto_fqdn }}"
          PORTAL_API_RESOURCE: "https://${{ steps.prep-env.outputs.webapi_fqdn }}"
          CLIENT_ORIGIN: "https://${{ steps.prep-env.outputs.swa_host }}"
          BFF_ORIGIN: "https://${{ steps.prep-env.outputs.bff_fqdn }}"
        run: |
          npm ci
          npm run seed:logto:prod || echo "Production Logto seeding completed or skipped safely."

      - name: Fetch Static Web App Deployment Token
        id: get-swa-token
        run: |
          SWA_TOKEN=$(az staticwebapp secrets list --name swa-sagacity-prod --resource-group rg-sagacity-prod --query properties.apiKey -o tsv)
          echo "token=${SWA_TOKEN}" >> $GITHUB_OUTPUT

      - name: Deploy React Client to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_BFF_ORIGIN: "https://${{ steps.prep-env.outputs.bff_fqdn }}"
        with:
          azure_static_web_apps_api_token: ${{ steps.get-swa-token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/sagacitysolutions.com.portal.Client"
          api_location: ""
          output_location: "dist"
