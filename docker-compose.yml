version: "3.9"

services:
  postgres:
    image: postgres:14-alpine
    container_name: sagacity-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto
      POSTGRES_DB: logto
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto"]
      interval: 5s
      timeout: 5s
      retries: 10

  logto:
    image: svhd/logto:latest
    container_name: sagacity-logto
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
      - "3002:3002"
    environment:
      # Core API / OIDC endpoint (used by clients and BFF)
      ENDPOINT: http://localhost:3001
      # Admin console endpoint
      ADMIN_ENDPOINT: http://localhost:3002
      DB_URL: postgresql://logto:logto@postgres:5432/logto
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]

  webapi:
    build:
      context: .
      dockerfile: src/sagacitysolutions.com.portal.WebApi/Dockerfile
    container_name: sagacity-webapi
    depends_on:
      postgres:
        condition: service_healthy
      logto:
        condition: service_started
    ports:
      - "5092:5092"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=sagacitysolutions;Username=logto;Password=logto
      ASPNETCORE_ENVIRONMENT: Development
    extra_hosts:
      - "localhost:host-gateway"

  logto-seeder:
    build:
      context: src/sagacitysolutions.com.portal.Client
      dockerfile: Dockerfile.seeder
    container_name: sagacity-logto-seeder
    depends_on:
      webapi:
        condition: service_started
      logto:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DB_HOST: postgres
      DB_CONTAINER: sagacity-postgres
      LOGTO_CONTAINER: sagacity-logto
      LOGTO_ENDPOINT: http://logto:3001
    extra_hosts:
      - "localhost:host-gateway"

  bff:
    build:
      context: src/sagacitysolutions.com.portal.Bff
      dockerfile: Dockerfile
    container_name: sagacity-bff
    depends_on:
      webapi:
        condition: service_started
      logto:
        condition: service_started
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      LOGTO_ENDPOINT: http://localhost:3001
      LOGTO_APP_ID: moxwjx3you2zdb4dglttg
      LOGTO_APP_SECRET: 7sAbhzKUoi42MtxZgEgIdU3LbQwTES1w
      CLIENT_ORIGIN: http://localhost:5173
      PORTAL_API_URL: http://webapi:5092
      PORTAL_API_RESOURCE: http://localhost:5092
      SESSION_SECRET: change-me-in-production-use-a-long-random-string
    extra_hosts:
      - "localhost:host-gateway"

  client:
    build:
      context: src/sagacitysolutions.com.portal.Client
      dockerfile: Dockerfile
    container_name: sagacity-client
    depends_on:
      bff:
        condition: service_started
    ports:
      - "5173:5173"
    environment:
      BFF_TARGET: http://bff:5000
    extra_hosts:
      - "localhost:host-gateway"

volumes:
  postgres_data:
